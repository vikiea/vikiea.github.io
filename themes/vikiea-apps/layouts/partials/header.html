<header class="site-header">
  <a class="skip-link" href="#main">{{ i18n "skip_to_content" }}</a>
  <div class="header-inner">
    <a class="brand" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }} {{ i18n "home_aria" }}">
      <span class="brand-mark">v</span>
      <span>{{ .Site.Title }}</span>
    </a>
    <div class="header-actions">
      <nav class="site-nav" aria-label="{{ i18n "main_navigation" }}">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
      {{ if gt (len .AllTranslations) 1 }}
        <nav class="language-nav" aria-label="{{ i18n "language_switcher" }}">
          {{ range .AllTranslations }}
            <a lang="{{ .Language.Lang }}" hreflang="{{ .Language.Locale }}" href="{{ .RelPermalink }}"{{ if eq .Language.Lang $.Site.Language.Lang }} aria-current="true"{{ end }}>{{ .Language.Label }}</a>
          {{ end }}
        </nav>
      {{ end }}
    </div>
  </div>
</header>
