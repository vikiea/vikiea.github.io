<footer class="site-footer">
  <div class="footer-inner">
    <p>© {{ now.Year }} {{ .Site.Params.author }}. {{ i18n "built_with" }}</p>
    <div class="footer-links">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
      {{ end }}
      {{ with .Site.Params.github }}<a href="{{ . }}" rel="me noopener" target="_blank">GitHub</a>{{ end }}
    </div>
  </div>
</footer>
{{ with resources.Get "js/main.js" }}
  {{ $script := . | minify | fingerprint }}
  <script src="{{ $script.RelPermalink }}" integrity="{{ $script.Data.Integrity }}" defer></script>
{{ end }}
