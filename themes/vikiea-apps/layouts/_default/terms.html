{{ define "main" }}
<section class="page-hero">
  <p class="soft-label">{{ i18n "taxonomy" }}</p>
  <h1>{{ .Title }}</h1>
  <p>{{ i18n "browse_notes_by_tag" }}</p>
</section>

<section class="section-shell">
  {{ if .Data.Terms }}
    <div class="term-grid">
      {{ range .Data.Terms.Alphabetical }}
        <a class="term-card" href="{{ .Page.RelPermalink }}">
          <span>{{ .Page.Title }}</span>
          <strong>{{ .Count }}</strong>
        </a>
      {{ end }}
    </div>
  {{ else }}
    <article class="empty-state">
      <p class="soft-label">{{ i18n "no_tags_yet" }}</p>
      <h2>{{ i18n "tags_after_posts" }}</h2>
    </article>
  {{ end }}
</section>
{{ end }}
