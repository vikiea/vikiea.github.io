baseURL = "https://vikiea.github.io/"
locale = "zh-CN"
title = "vikiea"
copyright = "© vikiea"
enableRobotsTXT = true
enableGitInfo = false
theme = "vikiea-apps"

[params]
  description = "App作品推荐与发布入口。"
  author = "vikiea"
  github = "https://github.com/vikiea"
  featuredAppURL = "/age_mac/"

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    noClasses = false
    style = "github"

[[menus.main]]
  name = "Apps"
  pageRef = "/apps"
  weight = 10
