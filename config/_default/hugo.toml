baseURL = "https://vikiea.github.io/"
title = "vikiea"
copyright = "© vikiea"
enableRobotsTXT = true
enableGitInfo = false
theme = "vikiea-apps"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

[params]
  description = "App作品推荐与发布入口。"
  author = "vikiea"
  github = "https://github.com/vikiea"
  featuredAppURL = "/age_mac/"

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    noClasses = false
    style = "github"

[languages]
  [languages.zh]
    locale = "zh-CN"
    label = "中文"
    title = "vikiea"
    weight = 1
    [languages.zh.params]
      description = "App作品推荐与发布入口。"
    [[languages.zh.menus.main]]
      name = "App"
      pageRef = "/apps"
      weight = 10
  [languages.en]
    locale = "en-US"
    label = "English"
    title = "vikiea"
    weight = 2
    [languages.en.params]
      description = "App recommendations and release entry points."
    [[languages.en.menus.main]]
      name = "Apps"
      pageRef = "/apps"
      weight = 10
