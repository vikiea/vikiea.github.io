<article class="post-card">
  <a href="{{ .RelPermalink }}">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
    <h3>{{ .Title }}</h3>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
    {{ with .Params.tags }}
      <div class="tag-row" aria-label="Tags">
        {{ range . }}<span>{{ . }}</span>{{ end }}
      </div>
    {{ end }}
  </a>
</article>
